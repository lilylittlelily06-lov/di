<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한결이의 커스텀 다꾸 다이어리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gamja+Flower&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --primary-color: #6c5ce7;
            --accent-color: #ff7675;
            --border-color: #e9ecef;
            --orange-marker: #ff9f43; /* 코멘트용 우측 주황색 띠 */
        }

        .font-sans { font-family: 'Pretendard', sans-serif; }
        .font-serif { font-family: 'Georgia', serif; }
        .font-cute { font-family: 'Gaegu', cursive; font-weight: 700; }
        .font-flower { font-family: 'Gamja Flower', cursive; }
        .font-pen { font-family: 'Nanum Pen Script', cursive; font-size: 1.5rem !important; }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-color);
            overflow: hidden; font-family: 'Pretendard', sans-serif;
        }

        .calendar-wrapper {
            width: 100%; height: 100vh; display: flex; flex-direction: column;
            padding: 30px; box-sizing: border-box; position: relative;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .calendar-wrapper.slide-out { transform: translateY(-20px); opacity: 0; pointer-events: none; }

        .calendar-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; background: var(--card-bg); padding: 16px 24px;
            border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            position: relative; z-index: 10;
        }

        .calendar-header h2 { margin: 0; font-size: 1.8rem; font-weight: 700; }
        .header-buttons { display: flex; gap: 12px; align-items: center; }
        .nav-btn {
            background: none; border: none; font-size: 1.3rem; cursor: pointer;
            padding: 5px 15px; color: var(--primary-color); font-weight: bold;
        }

        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); flex-grow: 1;
            background: var(--card-bg); border-radius: 20px; padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); gap: 4px;
        }

        .day-label { font-size: 1rem; font-weight: 600; color: #868e96; padding: 12px 0; text-align: center; }

        .day-cell {
            min-height: 100px; padding: 10px; box-sizing: border-box; background-color: #fff;
            border: 1px solid var(--border-color); border-radius: 12px;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start;
            cursor: pointer; user-select: none; transition: all 0.2s;
        }
        .day-cell:hover { background-color: #f1f3f5; border-color: #ced4da; }
        .day-number { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; width: 100%; display: flex; justify-content: space-between; }
        
        /* 스티커 흔적 완전 삭제 및 깔끔한 정리 */
        .diary-indicator { display: none !important; }

        .cell-todo-list { width: 100%; display: flex; flex-direction: column; gap: 5px; font-size: 0.85rem; }
        
        /* 📜 투두 박스 기본 레이아웃 */
        .cell-todo-item {
            position: relative; background-color: #f1f0fe; 
            padding: 6px 25px 6px 10px; border-radius: 6px; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            transition: transform 0.1s; display: block; width: 100%; box-sizing: border-box;
        }
        
        /* 🟠 [핵심] 코멘트 추가시 우측에 생기는 예쁜 주황색 띠 (image_d6e3a9 스타일) */
        .cell-todo-item.commented::after {
            content: ''; position: absolute; top: 0; right: 0; width: 8px; height: 100%;
            background-color: var(--orange-marker); border-top-right-radius: 6px; border-bottom-right-radius: 6px;
        }

        .day-cell.empty { background-color: transparent; border: none; cursor: default; }

        /* 🎨 여백 포함 자유 스케치북 */
        .drawing-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 50; }
        .drawing-canvas.active { pointer-events: auto; cursor: crosshair; z-index: 2100; }

        /* 🎨 확장형 드로잉 하단 툴바 */
        .paint-toolbar {
            display: none; gap: 16px; align-items: center; background: #1e222b;
            padding: 14px 28px; border-radius: 40px; position: fixed;
            bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 2500;
            box-shadow: 0 10px 40px rgba(0,0,0,0.35); color: #fff;
        }

        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: #fff; transform: scale(1.15); }

        .rainbow-picker-wrapper {
            position: relative; width: 26px; height: 26px; border-radius: 50%;
            background: linear-gradient(45deg, red, orange, yellow, green, blue, purple);
            cursor: pointer; overflow: hidden; border: 2px solid transparent;
        }
        .rainbow-picker-wrapper input[type="color"] { position: absolute; top: -5px; left: -5px; width: 40px; height: 40px; opacity: 0; cursor: pointer; }

        /* 🖌️ 브러쉬 종류 및 두께 조절 스타일 */
        .toolbar-select { background: #2f3542; color: #fff; border: 1px solid #57606f; padding: 6px 10px; border-radius: 8px; font-weight: 600; outline: none; cursor: pointer; }
        .thickness-slider-wrapper { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #f1f3f5; }
        .thickness-slider { width: 80px; accent-color: var(--primary-color); cursor: pointer; }

        /* 모달 팝업 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.35); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal-box { background: #fff; padding: 24px; border-radius: 20px; width: 90%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .modal-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; }
        .modal-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); background-color: #f1f3f5; border-radius: 12px; box-sizing: border-box; margin-bottom: 16px; outline: none; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 8px; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 6px; }
        .btn-cancel { background-color: #e9ecef; color: #495057; }
        .btn-submit { background-color: var(--primary-color); color: #fff; }
        .btn-paint { background-color: #ff9f43; color: #fff; }
        .btn-black { background-color: #2f3542; color: #fff; }

        .comment-history { max-height: 120px; overflow-y: auto; margin-bottom: 16px; background: #f8f9fa; border-radius: 10px; padding: 12px; font-size: 0.9rem; border: 1px solid #e9ecef; }
        .comment-node { padding: 6px 0; border-bottom: 1px dashed #e9ecef; color: #333; font-weight: 500; }

        /* 일기장 */
        .diary-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #fff; display: none; flex-direction: column; padding: 40px; box-sizing: border-box; z-index: 1000; }
        .diary-container { max-width: 900px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; height: 100%; position: relative; }
        .diary-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 20px; margin-bottom: 20px; }
        .diary-info-zone { display: flex; flex-direction: column; gap: 4px; }
        .diary-date { font-size: 2rem; font-weight: 800; color: var(--primary-color); }
        .diary-time { font-size: 0.95rem; color: #868e96; font-weight: 500; }
        .diary-ctrl-zone { display: flex; gap: 12px; align-items: center; }
        .font-selector { padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border-color); font-weight: 600; background-color: #f1f3f5; outline: none; cursor: pointer; }
        .diary-content-wrapper { position: relative; flex-grow: 1; display: flex; }
        .diary-content { flex-grow: 1; width: 100%; border: none; resize: none; font-size: 1.35rem; line-height: 2; outline: none; background: linear-gradient(transparent, transparent 39px, #e9ecef 39px, #e9ecef 40px); background-size: 100% 40px; padding: 10px 0; z-index: 5; position: relative; }
        
        .save-toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background-color: #2ed573; color: white; padding: 12px 28px; border-radius: 30px; font-weight: 700; box-shadow: 0 5px 15px rgba(0,0,0,0.15); display: none; z-index: 4000; }
    </style>
</head>
<body class="font-sans">

<canvas class="drawing-canvas" id="calCanvas"></canvas>

<div class="calendar-wrapper" id="calendarWrapper">
    <div class="calendar-header">
        <div>
            <button class="nav-btn" onclick="changeMonth(-1)">◀ 이전 달</button>
            <button class="nav-btn" onclick="changeMonth(1)">다음 달 ▶</button>
        </div>
        <h2 id="monthTitle">2026년 6월</h2>
        <div class="header-buttons">
            <button class="btn btn-paint" id="calPaintBtn" onclick="startDrawingMode('cal')">🎨 아름답게 꾸미기</button>
        </div>
    </div>

    <div class="calendar-grid" id="calendarGrid">
        <div class="day-label" style="color: var(--accent-color);">일</div>
        <div class="day-label">월</div>
        <div class="day-label">화</div>
        <div class="day-label">수</div>
        <div class="day-label">목</div>
        <div class="day-label">금</div>
        <div class="day-label">토</div>
    </div>
</div>

<div class="modal-overlay" id="todoModal">
    <div class="modal-box">
        <div class="modal-title" id="modalDateTitle">일정 추가</div>
        <input type="text" class="modal-input" id="modalInput" placeholder="새로운 일정을 입력해 봐...">
        <div class="modal-buttons">
            <button class="btn btn-cancel" onclick="closeModal('todoModal')">취소</button>
            <button class="btn btn-submit" onclick="submitTodo()">등록</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="commentModal">
    <div class="modal-box">
        <div class="modal-title" id="commentTargetTitle">세부사항 코멘트</div>
        <div class="comment-history" id="commentHistory"></div>
        <input type="text" class="modal-input" id="commentInput" placeholder="오늘 2리터 마심 등 코멘트를 추가해 봐...">
        <div class="modal-buttons">
            <button class="btn btn-cancel" onclick="closeModal('commentModal')">닫기</button>
            <button class="btn btn-submit" onclick="submitComment()">코멘트 저장</button>
        </div>
    </div>
</div>

<div class="diary-page" id="diaryPage">
    <canvas class="drawing-canvas" id="diaryCanvas"></canvas>
    <div class="diary-container">
        <div class="diary-header">
            <div class="diary-info-zone">
                <div class="diary-date" id="diaryDateDisplay">일기장 페이지</div>
                <div class="diary-time" id="diaryTimeDisplay">기록 시간 로딩중...</div>
            </div>
            <div class="diary-ctrl-zone">
                <select class="font-selector" id="fontSelector" onchange="changeDiaryFont()">
                    <option value="font-sans">기본 고딕체</option>
                    <option value="font-serif">정갈한 바탕체</option>
                    <option value="font-cute">동글동글 개구체 🧸</option>
                    <option value="font-flower">감자꽃 이야기체 🌸</option>
                    <option value="font-pen">나눔 손글씨 펜체 ✒️</option>
                </select>
                <button class="btn btn-paint" id="diaryPaintBtn" onclick="startDrawingMode('diary')">🎨 그림 그리기</button>
                <button class="btn btn-cancel" id="diaryBackBtn" onclick="closeDiaryPage()">돌아가기</button>
                <button class="btn btn-submit" id="diarySaveBtn" onclick="saveDiaryTextOnly()">일기 저장 📝</button>
            </div>
        </div>
        <div class="diary-content-wrapper">
            <textarea class="diary-content" id="diaryTextArea" placeholder="오늘 하루 어떤 재미난 일이 있었어? 깊은 생각들을 적어줘..."></textarea>
        </div>
    </div>
</div>

<!-- 🎨 강도 조절 및 브러쉬 선택 기능이 추가된 무지개 팔레트 제어판 -->
<div class="paint-toolbar" id="paintToolbar">
    <div class="color-dot active" style="background-color: #2f3542;" onclick="setPaintColor('#2f3542', this)"></div>
    <div class="color-dot" style="background-color: #ff4757;" onclick="setPaintColor('#ff4757', this)"></div>
    <div class="color-dot" style="background-color: #1e90ff;" onclick="setPaintColor('#1e90ff', this)"></div>
    <div class="color-dot" style="background-color: #2ed573;" onclick="setPaintColor('#2ed573', this)"></div>
    
    <div class="rainbow-picker-wrapper" id="rainbowWrapper" title="더 많은 색깔 고르기">
        <input type="color" id="htmlColorPicker" value="#ff4757" onchange="pickRainbowColor(this.value)">
    </div>
    
    <span style="color:#555;">|</span>
    
    <!-- 🖌️ 브러쉬 타입 추가 -->
    <select class="toolbar-select" id="brushTypeSelect" onchange="updateBrushSettings()">
        <option value="normal">일반 펜 ✏️</option>
        <option value="highlighter">형광펜 🖍️</option>
        <option value="brush">캘리 붓 ✒️</option>
    </select>

    <!-- 📏 두께 및 강도 조절기 -->
    <div class="thickness-slider-wrapper">
        <span>두께</span>
        <input type="range" class="thickness-slider" id="brushThickness" min="1" max="30" value="4" oninput="updateBrushSettings()">
        <span id="thicknessNum">4px</span>
    </div>
    
    <span style="color:#555;">|</span>
    
    <button class="btn btn-black" style="padding:4px 10px; font-size:0.8rem;" onclick="setEraserMode()">🧹 지우개</button>
    <button class="btn btn-cancel" style="padding:4px 10px; font-size:0.8rem;" onclick="undoPaint()">↩ 되돌리기</button>
    <button class="btn btn-submit" style="background-color:#ff9f43;" onclick="stopDrawingMode()">💾 저장</button>
</div>

<div class="save-toast" id="saveToast">성공적으로 안전하게 저장되었어! ✨</div>

<script>
    let currentYear = 2026;
    let currentMonth = 5; 
    let activeDay = null;
    let activeTodoKey = null; 
    let activeTodoIndex = null; 
    let clickTimer = null;

    const todoStorage = JSON.parse(localStorage.getItem('todoStorage')) || {
        "2026-5-23": [
            { text: "물 많이 마시기 💧", comments: ["오늘 2리터 마심"] }
        ]
    };
    const diaryStorage = JSON.parse(localStorage.getItem('diaryStorage')) || {};
    const fontStorage = JSON.parse(localStorage.getItem('fontStorage')) || {};

    const monthNames = ["1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"];

    let isDrawing = false;
    let currentCanvas = null;
    let ctx = null;
    let drawMode = 'cal'; 
    let strokeColor = '#2f3542';
    let undoStack = { cal: {}, diary: {} };
    
    let lastX = 0;
    let lastY = 0;

    function saveToLocalStorage() {
        localStorage.setItem('todoStorage', JSON.stringify(todoStorage));
        localStorage.setItem('diaryStorage', JSON.stringify(diaryStorage));
        localStorage.setItem('fontStorage', JSON.stringify(fontStorage));
    }

    setInterval(() => {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const target = document.getElementById('diaryTimeDisplay');
        if(target) target.innerText = `기록 시간 : ${timeStr}`;
    }, 1000);

    function renderCalendar() {
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        
        document.getElementById('monthTitle').innerText = `${currentYear}년 ${monthNames[currentMonth]}`;
        
        const grid = document.getElementById('calendarGrid');
        const labels = grid.querySelectorAll('.day-label');
        grid.innerHTML = '';
        labels.forEach(label => grid.appendChild(label));

        for (let i = 0; i < firstDay; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.classList.add('day-cell', 'empty');
            grid.appendChild(emptyCell);
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const cell = document.createElement('div');
            cell.classList.add('day-cell');
            
            const dayNumDiv = document.createElement('div');
            dayNumDiv.classList.add('day-number');
            
            const numSpan = document.createElement('span');
            numSpan.innerText = day;
            if(new Date(currentYear, currentMonth, day).getDay() === 0) numSpan.style.color = 'var(--accent-color)';
            dayNumDiv.appendChild(numSpan);
            cell.appendChild(dayNumDiv);

            const todoListDiv = document.createElement('div');
            todoListDiv.classList.add('cell-todo-list');
            
            const key = `${currentYear}-${currentMonth}-${day}`;
            const todos = todoStorage[key] || [];
            todos.forEach((todoObj, index) => {
                const item = document.createElement('div');
                item.classList.add('cell-todo-item');
                item.innerText = todoObj.text;
                
                // 🟠 [우측 주황색 띠] 코멘트가 있으면 클래스 붙여서 CSS 우측 가상 요소 작동하게 함!
                if(todoObj.comments && todoObj.comments.length > 0) {
                    item.classList.add('commented');
                }

                item.onclick = (e) => {
                    e.stopPropagation(); 
                    openCommentModal(key, index, todoObj);
                };
                todoListDiv.appendChild(item);
            });
            cell.appendChild(todoListDiv);

            cell.onclick = () => {
                if (clickTimer) {
                    clearTimeout(clickTimer);
                    clickTimer = null;
                    openDiaryPage(day);
                } else {
                    clickTimer = setTimeout(() => {
                        clickTimer = null;
                        openTodoModal(day);
                    }, 220);
                }
            };
            grid.appendChild(cell);
        }
        setTimeout(() => resizeAndLoadCanvas('cal'), 30);
    }

    function changeMonth(direction) { currentMonth += direction; renderCalendar(); }
    function openTodoModal(day) { activeDay = day; document.getElementById('modalDateTitle').innerText = `${currentMonth + 1}월 ${day}일 일정 등록`; document.getElementById('modalInput').value = ''; document.getElementById('todoModal').style.display = 'flex'; document.getElementById('modalInput').focus(); }

    function openDiaryPage(day) {
        activeDay = day;
        const key = `${currentYear}-${currentMonth}-${activeDay}`;
        document.getElementById('diaryDateDisplay').innerText = `${currentYear}년 ${currentMonth + 1}월 ${day}일의 하루`;
        document.getElementById('diaryTextArea').value = diaryStorage[key] || '';
        document.getElementById('fontSelector').value = fontStorage[key] || 'font-sans';
        changeDiaryFont();
        document.getElementById('calendarWrapper').classList.add('slide-out');
        document.getElementById('diaryPage').style.display = 'flex';
        setTimeout(() => resizeAndLoadCanvas('diary'), 30);
    }

    function changeDiaryFont() { document.getElementById('diaryTextArea').className = 'diary-content ' + document.getElementById('fontSelector').value; }
    function closeDiaryPage() { document.getElementById('diaryPage').style.display = 'none'; document.getElementById('calendarWrapper').classList.remove('slide-out'); renderCalendar(); }

    function saveDiaryTextOnly() {
        const key = `${currentYear}-${currentMonth}-${activeDay}`;
        const content = document.getElementById('diaryTextArea').value.trim();
        if(content) diaryStorage[key] = content; else delete diaryStorage[key];
        fontStorage[key] = document.getElementById('fontSelector').value;
        saveToLocalStorage();
        const toast = document.getElementById('saveToast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 1500);
    }

    function openCommentModal(key, index, todoObj) {
        activeTodoKey = key; activeTodoIndex = index;
        document.getElementById('commentTargetTitle').innerText = `[${todoObj.text}] 세부 코멘트 메모`;
        document.getElementById('commentInput').value = '';
        const historyDiv = document.getElementById('commentHistory');
        historyDiv.innerHTML = '';
        
        if(!todoObj.comments || todoObj.comments.length === 0) {
            historyDiv.innerHTML = '<div style="color:#aaa; text-align:center; padding: 10px 0;">코멘트 메모가 비어있어용.</div>';
        } else {
            todoObj.comments.forEach(com => {
                const node = document.createElement('div');
                node.classList.add('comment-node');
                node.innerText = `💬 ${com}`;
                historyDiv.appendChild(node);
            });
        }
        document.getElementById('commentModal').style.display = 'flex';
        document.getElementById('commentInput').focus();
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function submitTodo() {
        const text = document.getElementById('modalInput').value.trim();
        if (text) {
            const key = `${currentYear}-${currentMonth}-${activeDay}`;
            if (!todoStorage[key]) todoStorage[key] = [];
            todoStorage[key].push({ text: text, comments: [] });
            saveToLocalStorage();
            renderCalendar();
        }
        closeModal('todoModal');
    }

    function submitComment() {
        const comText = document.getElementById('commentInput').value.trim();
        if (comText && activeTodoKey !== null && activeTodoIndex !== null) {
            if(!todoStorage[activeTodoKey][activeTodoIndex].comments) {
                todoStorage[activeTodoKey][activeTodoIndex].comments = [];
            }
            todoStorage[activeTodoKey][activeTodoIndex].comments.push(comText);
            saveToLocalStorage();
            openCommentModal(activeTodoKey, activeTodoIndex, todoStorage[activeTodoKey][activeTodoIndex]);
        } else {
            closeModal('commentModal');
        }
    }

    // 🎨 ================= 업그레이드 브러쉬 그리기 시스템 =================
    
    function startDrawingMode(mode) {
        drawMode = mode;
        currentCanvas = document.getElementById(mode === 'cal' ? 'calCanvas' : 'diaryCanvas');
        ctx = currentCanvas.getContext('2d');
        
        currentCanvas.classList.add('active');
        document.getElementById('paintToolbar').style.display = 'flex';
        
        updateBrushSettings();

        currentCanvas.onmousedown = startDrawing;
        currentCanvas.onmousemove = draw;
        currentCanvas.onmouseup = stopDrawing;
        
        saveUndoState();
    }

    function updateBrushSettings() {
        if(!ctx) return;
        const bType = document.getElementById('brushTypeSelect').value;
        const thickness = document.getElementById('brushThickness').value;
        document.getElementById('thicknessNum').innerText = `${thickness}px`;

        ctx.globalCompositeOperation = 'source-over';
        ctx.lineWidth = thickness;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = strokeColor;

        // 브러쉬 종류별 투명도/스타일 효과 분기
        if (bType === 'highlighter') {
            // 형광펜 모드: 반투명하게 겹쳐지도록 세팅
            ctx.globalAlpha = 0.4;
        } else if (bType === 'brush') {
            // 캘리그라피 붓 모드: 살짝 납작하거나 각진 느낌 연출 효과 부여
            ctx.globalAlpha = 0.9;
        } else {
            ctx.globalAlpha = 1.0;
        }
    }

    function startDrawing(e) {
        isDrawing = true;
        lastX = e.clientX;
        lastY = e.clientY;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
    }

    function draw(e) {
        if (!isDrawing) return;
        const bType = document.getElementById('brushTypeSelect').value;
        
        if (bType === 'brush') {
            // 붓 브러쉬 속도/각도에 따른 다이나믹 선 효과 모방
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(e.clientX, e.clientY);
            ctx.stroke();
        } else {
            // 일반 펜 & 형광펜 모드
            ctx.lineTo(e.clientX, e.clientY);
            ctx.stroke();
        }
        lastX = e.clientX;
        lastY = e.clientY;
    }

    function stopDrawing() { if (isDrawing) { isDrawing = false; ctx.closePath(); saveUndoState(); } }

    function setPaintColor(color, element) {
        strokeColor = color;
        updateBrushSettings();
        document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
        document.getElementById('rainbowWrapper').style.borderColor = 'transparent';
        if(element) element.classList.add('active');
    }

    function pickRainbowColor(colorValue) {
        strokeColor = colorValue;
        updateBrushSettings();
        document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
        document.getElementById('rainbowWrapper').style.borderColor = '#fff';
    }

    function setEraserMode() {
        ctx.globalAlpha = 1.0;
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = 25;
    }

    function stopDrawingMode() {
        if(!currentCanvas) return;
        currentCanvas.classList.remove('active');
        document.getElementById('paintToolbar').style.display = 'none';
        
        if(drawMode === 'diary') {
            const key = `${currentYear}-${currentMonth}-${activeDay}`;
            localStorage.setItem(`global_diary_draw_${key}`, currentCanvas.toDataURL());
        } else {
            localStorage.setItem(`global_cal_draw_${currentYear}_${currentMonth}`, currentCanvas.toDataURL());
        }
        currentCanvas.onmousedown = null; currentCanvas.onmousemove = null; currentCanvas.onmouseup = null;
    }

    function saveUndoState() {
        const id = drawMode === 'cal' ? `${currentYear}_${currentMonth}` : `${currentYear}_${currentMonth}_${activeDay}`;
        if (!undoStack[drawMode][id]) undoStack[drawMode][id] = [];
        if (undoStack[drawMode][id].length > 20) undoStack[drawMode][id].shift();
        undoStack[drawMode][id].push(currentCanvas.toDataURL());
    }

    function undoPaint() {
        const id = drawMode === 'cal' ? `${currentYear}_${currentMonth}` : `${currentYear}_${currentMonth}_${activeDay}`;
        if (!undoStack[drawMode][id] || undoStack[drawMode][id].length <= 1) return;
        undoStack[drawMode][id].pop();
        const previousStateData = undoStack[drawMode][id][undoStack[drawMode][id].length - 1];
        const img = new Image();
        img.src = previousStateData;
        img.onload = function() {
            ctx.clearRect(0, 0, currentCanvas.width, currentCanvas.height);
            ctx.drawImage(img, 0, 0);
        };
    }

    function resizeAndLoadCanvas(mode) {
        const canvas = document.getElementById(mode === 'cal' ? 'calCanvas' : 'diaryCanvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const localCtx = canvas.getContext('2d');

        let dataURL = mode === 'cal' ? localStorage.getItem(`global_cal_draw_${currentYear}_${currentMonth}`) : localStorage.getItem(`global_diary_draw_${`${currentYear}-${currentMonth}-${activeDay}`}`);
        if (dataURL) {
            const img = new Image(); img.src = dataURL;
            img.onload = function() { localCtx.drawImage(img, 0, 0); };
        }
    }

    window.onclick = function(e) { if (e.target.classList.contains('modal-overlay')) e.target.style.display = 'none'; };
    window.onresize = function() { resizeAndLoadCanvas('cal'); if(document.getElementById('diaryPage').style.display === 'flex') resizeAndLoadCanvas('diary'); };

    renderCalendar();
</script>
</body>
</html>
